<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>从链接到 Playbook</title><link rel="stylesheet" href="../styles.css"></head><body><main class="section" style="max-width:820px"><a class="pill" href="../index.html">← Home</a><p class="kicker" style="margin-top:44px">Workflow</p><h1 style="font-size:clamp(46px,8vw,86px)">从链接到 Playbook</h1><p class="lead">一个链接只有被读完、验证、抽象、复现，才真正进入系统。</p><p class="about-copy">我喜欢把链接处理成四步：抓取原文；提炼关键判断；做最小验证；写成别人可执行的落地卡。这样信息不会停在“收藏夹”，而会变成可复用资产。</p></main></body></html>
